name: Verify

on:
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Analyze
        run: flutter analyze

      - name: Unit tests + coverage (≥20%)
        run: |
          set -euo pipefail
          flutter test test/unit --coverage
          cp coverage/lcov.info coverage/lcov-unit.raw.info

          lcov --ignore-errors unused \
            --remove coverage/lcov-unit.raw.info \
            '**/*.g.dart' \
            '**/*.freezed.dart' \
            '**/generated/**' \
            -o coverage/lcov-unit.info

          LINE_PCT=$(lcov --summary coverage/lcov-unit.info 2>&1 \
            | grep -E '^\s+lines\.\.\.\.+:' \
            | head -1 \
            | sed -E 's/.*: ([0-9.]+)%.*/\1/')

          echo "Unit line coverage: ${LINE_PCT}% (min 20%)"
          awk -v p="$LINE_PCT" 'BEGIN { exit !(p >= 20) }' || {
            echo "Unit coverage ${LINE_PCT}% is below 20%"
            exit 1
          }
